<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Simulator - Phase 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            min-width: 300px;
            text-align: center;
            z-index: 10;
        }

        .hud-row {
            display: flex;
            justify-content: space-around;
            margin: 8px 0;
            font-size: 16px;
            font-weight: bold;
        }

        .hud-label {
            color: #00aa00;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
            min-width: 100px;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            max-width: 250px;
            z-index: 10;
        }

        .control-item {
            margin: 4px 0;
            opacity: 0.8;
        }

        #debug {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border: 1px solid #ffff00;
            border-radius: 4px;
            max-width: 300px;
            z-index: 10;
        }

        .debug-item {
            margin: 2px 0;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- HUD Display -->
    <div id="hud">
        <div class="hud-label">F1 Simulator - Phase 1</div>
        <div class="hud-row">
            <div>
                <div class="hud-label">Speed</div>
                <div class="hud-value" id="speed">0 km/h</div>
            </div>
            <div>
                <div class="hud-label">Position</div>
                <div class="hud-value" id="position">0.0%</div>
            </div>
        </div>
    </div>

    <!-- Controls Info -->
    <div id="controls">
        <div class="hud-label">Controls</div>
        <div class="control-item">W - Forward</div>
        <div class="control-item">S - Backward</div>
        <div class="control-item">A - Turn Left</div>
        <div class="control-item">D - Turn Right</div>
        <div class="control-item">SPACE - Reset</div>
    </div>

    <!-- Debug Info -->
    <div id="debug">
        <div class="hud-label">Debug Info</div>
        <div class="debug-item">FPS: <span id="fps">0</span></div>
        <div class="debug-item">Camera Pos X: <span id="camX">0.0</span></div>
        <div class="debug-item">Camera Pos Y: <span id="camY">0.0</span></div>
        <div class="debug-item">Camera Pos Z: <span id="camZ">0.0</span></div>
        <div class="debug-item">Track Segment: <span id="trackSeg">0</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/track.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
